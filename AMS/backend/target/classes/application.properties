# ============================================================
# AMS - Application Configuration
# ============================================================

spring.application.name=asset-management-system

# ── Oracle DataSource ────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=system
spring.datasource.password=B4480
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Fix for circular dependency issue
spring.main.allow-circular-references=true

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=AMSSecretKey2024!PleaseChangeThisToALong256BitKeyInProduction
app.jwt.expiration-ms=86400000

# ── OTP (Mock) ───────────────────────────────────────────────
app.otp.expiry-minutes=15

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173

# ── Server ───────────────────────────────────────────────────
server.port=8080
server.error.include-message=always